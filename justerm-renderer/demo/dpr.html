<!doctype html>
<meta charset="utf-8" />
<title>justerm-renderer proof — devicePixelRatio + resize (#265)</title>
<style>
  body { margin: 0; background: #000; }
  #c { display: block; image-rendering: pixelated; }
</style>
<!--
  #265 proof: the renderer reads window.devicePixelRatio, rasterises the atlas at device px, and
  `resize(CSS px)` sizes the GL buffer to CSS*dpr. The Playwright runner loads this page at several
  deviceScaleFactors; the checks below hold at each, and the runner additionally compares the CSS
  cell across densities (property (b) needs two runs to be falsifiable).
    (a) buffer == round(CSS * dpr)  → resize applies the DPR (a device-px resize gives buffer == CSS)
    (b) the DEVICE cell scales with the DPR while the CSS cell does not → the atlas is rasterised at
        device px (a CSS-px atlas would show the opposite: a fixed device cell and a cell_width()
        that HALVES at dpr 2)  ← needs two densities, so the runner asserts it
    (c) the CSS cell is the device cell divided by the DPR and rounded (#328). It is therefore not
        perfectly constant: the ink-scanned cell is 16 device px tall at dpr 1 but 33 at dpr 2, so
        cell_height() reports 16 and then 17. That rounding is tracked as #331.
  Build: wasm-pack build --target web --dev --out-dir pkg
-->
<canvas id="c" width="64" height="64"></canvas>
<script type="module">
  import init, { JustermRenderer } from "../pkg/justerm_renderer.js";
  import { deviceCell, readCells, countLit, gridFit } from "./proof.js";
  const FG = 0xffffff, BG = 0x1e1e2e;
  await init();

  const palette = new Uint32Array(256);
  const r = new JustermRenderer("#c", palette, FG, BG);
  const dpr = window.devicePixelRatio;

  // cell_width/height are CSS px; the CSS box we resize to is a whole number of CSS cells.
  const cellCssW = r.cell_width(), cellCssH = r.cell_height();
  const COLS = 4, ROWS = 1;
  const cssW = COLS * cellCssW, cssH = ROWS * cellCssH;
  r.resize(cssW, cssH); // CSS px — the renderer multiplies by DPR internally

  // Draw "A" in cell 0 (rest blank) and render.
  const zeros = new Uint32Array(COLS);
  const cps = new Uint32Array([0x41, 0x20, 0x20, 0x20]);
  r.apply_frame(COLS, ROWS, zeros, zeros, cps, new Uint16Array(COLS), true);
  r.render();

  // Count lit pixels of "A" over its DEVICE cell (readPixels is on the device-px buffer).
  const canvas = document.querySelector("#c");
  const gl = canvas.getContext("webgl2");
  const [dcw, dch] = deviceCell(r);
  const litA = countLit(readCells(gl, r, 0));

  window.__proof = {
    dpr,
    // The DRAWING BUFFER, not the canvas attributes: WebGL may hand back a smaller buffer than the
    // size requested (WebGL 1.0 § drawingBufferWidth — MAX_VIEWPORT_DIMS / MAX_TEXTURE_SIZE
    // clamping), and `readPixels` addresses the buffer. One source of truth for both.
    bufferW: gl.drawingBufferWidth, bufferH: gl.drawingBufferHeight,
    canvasAttrs: [canvas.width, canvas.height],
    cssW, cssH, cellCssW, cellCssH,
    deviceCell: [dcw, dch], litA,
    gridFit: gridFit(gl, r, COLS, ROWS),
    checks: {
      // (a) resize() speaks CSS px and the renderer applies the DPR to the drawing buffer.
      bufferIsCssTimesDpr:
        gl.drawingBufferWidth === Math.round(cssW * dpr) &&
        gl.drawingBufferHeight === Math.round(cssH * dpr),
      // The glyph actually rendered where we looked.
      glyphRenders: litA > 0,
      // (c) the CSS cell is exactly the rounded quotient of the device cell — the lossy conversion
      //     #328 is about. This pins WHICH direction is authoritative: device is, CSS is derived.
      cssCellIsRoundedDeviceCell:
        cellCssW === Math.round(dcw / dpr) && cellCssH === Math.round(dch / dpr),
    },
  };
  window.__proof.ok = Object.values(window.__proof.checks).every(Boolean);
  window.__done = true;
</script>
