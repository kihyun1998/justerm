<!doctype html>
<meta charset="utf-8" />
<title>justerm-renderer proof — never-restored context notification (#327)</title>
<style>
  body { margin: 0; background: #000; }
  #c { display: block; image-rendering: pixelated; }
</style>
<!--
  #327 proof: a lost context that does not come back within the deadline must tell the consumer —
  exactly once, and only when it really didn't come back.

  A context killed with `WEBGL_lose_context.loseContext()` is never auto-restored by the browser
  (Chromium sets auto_recovery_method_ = kManual for a synthetic loss; only a REAL lost context gets
  the 1-second retry loop). That makes the "never restored" path deterministic to drive here.

  Three cases, in order:
    A  suppression — restored before the deadline: the callback must NOT fire. (The negative is the
       assertion that matters; a notifier that always fires would pass the positive case alone.)
    B  overdue     — never restored: fires once, and stays once. Then a LATE restore still heals,
       because the deadline is a warning to the consumer, not a verdict on the context.
    C  stale epoch — a deadline left over from an earlier loss lands while a NEW loss is in its grace
       period. It must stay quiet: the state alone ("lost, not yet notified") cannot tell the two
       deadlines apart, only the loss epoch can.

  Build: wasm-pack build --target web --dev --out-dir pkg
-->
<canvas id="c" width="128" height="32"></canvas>
<script type="module">
  import init, { JustermRenderer } from "../pkg/justerm_renderer.js";
  import { readCells, countLit, gridFit } from "./proof.js";
  const FG = 0xffffff, BG = 0x1e1e2e;
  await init();

  const palette = new Uint32Array(256);
  const r = new JustermRenderer("#c", palette, FG, BG);
  const CW = r.cell_width(), CH = r.cell_height();
  const COLS = 4;
  r.resize(COLS * CW, CH);

  const canvas = document.querySelector("#c");
  const gl = canvas.getContext("webgl2");
  const lose = gl.getExtension("WEBGL_lose_context");
  if (!lose) throw new Error("WEBGL_lose_context unavailable — cannot prove #327");

  const sleep = (ms) => new Promise((res) => setTimeout(res, ms));
  const once = (event) => new Promise((res) => canvas.addEventListener(event, res, { once: true }));
  // Chrome refuses `restoreContext()` until the `webglcontextlost` dispatch has fully unwound; a
  // microtask (awaiting the event) is not enough. See demo/context-loss.html (#269).
  const killContext = async () => { const e = once("webglcontextlost"); lose.loseContext(); await e; await sleep(0); };
  const reviveContext = async () => { const e = once("webglcontextrestored"); lose.restoreContext(); await e; };

  // readPixels addresses the device-px drawing buffer; ask the renderer for its device cell (#328).
  const litCells = () =>
    Array.from({ length: COLS }, (_, col) => countLit(readCells(gl, r, col)));

  const cps = new Uint32Array([0x57, 0x58, 0x59, 0x5a]); // WXYZ
  const zeros = new Uint32Array(COLS), flags = new Uint16Array(COLS);
  r.apply_frame(COLS, 1, zeros, zeros, cps, flags, true);
  r.render();
  const baseline = litCells();

  let notifications = 0;
  r.setOnContextLoss(() => { notifications += 1; });

  // --- A. restored in time → the consumer is never told -----------------------------------------
  const DEADLINE = 300;
  r.setContextRestoreTimeoutMs(DEADLINE);
  await killContext();
  await reviveContext();
  r.render();
  // Read the pixels in the SAME task as the render: without `preserveDrawingBuffer` the browser
  // clears the drawing buffer once it has composited, so a readPixels after any `await` sees zeros.
  const suppressedPixels = litCells();
  await sleep(DEADLINE * 2); // let the (uncancelled) deadline land and find the context alive
  const suppressed = { notifications, overdue: r.isRestoreOverdue(), pixels: suppressedPixels };

  // --- B. never restored → told exactly once; a late restore still heals -------------------------
  await killContext();
  await sleep(DEADLINE * 2);
  const overdue = { notifications, overdue: r.isRestoreOverdue(), lost: r.isContextLost() };
  await sleep(DEADLINE * 2); // a second grace period: no second notification
  const stillOnce = notifications;

  await reviveContext(); // arrives long after we warned the consumer
  r.render();            // no apply_frame — #269's restore repaints the pre-loss frame
  const lateHeal = { notifications, overdue: r.isRestoreOverdue(), lost: r.isContextLost(), pixels: litCells() };

  // --- C. a deadline from an earlier loss must not notify for the current one --------------------
  // loss#1 at t=0 (deadline t=800) → restored at t≈0 → loss#2 at t=300 (deadline t=1100).
  // At t=800 loss#1's timer fires: the context IS lost and we have NOT notified for loss#2, so only
  // the epoch keeps it quiet. Sample at t≈950 — after loss#1's deadline, before loss#2's.
  const LONG = 800;
  r.setContextRestoreTimeoutMs(LONG);
  const before = notifications;
  await killContext();      // loss #1  → deadline armed for t≈LONG
  await reviveContext();
  await sleep(300);
  await killContext();      // loss #2  → deadline armed for t≈300+LONG
  await sleep(LONG - 150);  // t ≈ 950 from loss #1: its stale deadline has fired by now
  const staleQuiet = { notifications: notifications - before, overdue: r.isRestoreOverdue() };

  await sleep(500);         // t ≈ 1450: loss #2's own deadline has fired
  const ownDeadlineFires = { notifications: notifications - before, overdue: r.isRestoreOverdue() };

  await reviveContext();
  r.render();

  window.__proof = {
    dpr: window.devicePixelRatio, gridFit: gridFit(gl, r, COLS, 1),
    baseline, suppressed, overdue, stillOnce, lateHeal, staleQuiet, ownDeadlineFires,
    checks: {
      baselineRenders: baseline.every((n) => n > 0),
      // A — the suppression proof. A notifier that always fires would pass every positive check.
      restoredInTimeNeverNotifies: suppressed.notifications === 0 && suppressed.overdue === false,
      restoredInTimeKeepsPixels: suppressed.pixels.join() === baseline.join(),
      // B — fires, once, and is observable by polling too.
      overdueNotifiesOnce: overdue.notifications === 1 && stillOnce === 1,
      overdueIsPollable: overdue.overdue === true && overdue.lost === true,
      // B — the divergence from a "terminal" model: a late restore heals and clears the flag.
      lateRestoreHeals:
        lateHeal.overdue === false && lateHeal.lost === false &&
        lateHeal.pixels.join() === baseline.join(),
      lateRestoreDoesNotRenotify: lateHeal.notifications === 1,
      // C — the epoch guard. Without it, loss #1's leftover timer notifies during loss #2's grace
      // period and this reads 1 instead of 0.
      staleDeadlineStaysQuiet: staleQuiet.notifications === 0 && staleQuiet.overdue === false,
      ownDeadlineStillFires: ownDeadlineFires.notifications === 1 && ownDeadlineFires.overdue === true,
    },
  };
  window.__proof.ok = Object.values(window.__proof.checks).every(Boolean);
  window.__done = true;
</script>
