<!doctype html>
<meta charset="utf-8" />
<title>justerm-renderer wide/CJK proof (#268)</title>
<style>
  body { margin: 0; background: #000; }
  #c { display: block; image-rendering: pixelated; }
</style>
<!--
  Wide/CJK proof (#268): a double-width glyph ('中') is rasterised at 2*cell_w, split into
  two atlas slots, and rendered across its lead cell + spacer cell. readPixels proves BOTH
  cells carry glyph coverage — the spacer cell (codepoint space) is NOT blank, which only
  happens if the wide right-half slot was assigned to it. Build:
    wasm-pack build --target web --dev --out-dir pkg
-->
<canvas id="c" width="320" height="200"></canvas>
<script type="module">
  import init, { JustermRenderer } from "../pkg/justerm_renderer.js";

  // CellFlags bits.
  const WIDE_CHAR = 1 << 8, WIDE_SPACER = 1 << 9;
  const FG = 0xffffff, BG = 0x1e1e2e, H = 200;
  await init();

  const palette = new Uint32Array(256);
  const r = new JustermRenderer("#c", palette, FG, BG);
  r.resize(320, H);
  const CW = r.cell_width(), CH = r.cell_height();

  // 4 cells: 中 (wide lead) + its spacer, then 'A' (normal), then a blank space (control).
  const cps   = new Uint32Array([0x4e2d, 0x20,         0x41, 0x20]);
  const flags = new Uint16Array([WIDE_CHAR, WIDE_SPACER, 0,   0]);
  const zeros = new Uint32Array([0, 0, 0, 0]);
  r.apply_frame(4, 1, zeros, zeros, cps, flags);
  r.render();

  const gl = document.querySelector("#c").getContext("webgl2");
  const scanBright = (col) => {
    const buf = new Uint8Array(CW * CH * 4);
    gl.readPixels(col * CW, H - CH, CW, CH, gl.RGBA, gl.UNSIGNED_BYTE, buf);
    let n = 0;
    for (let i = 0; i < buf.length; i += 4) if (buf[i] > 150) n++;
    return n; // count of fg-ish pixels
  };

  const leadHalf = scanBright(0);   // 中 left half
  const spacerHalf = scanBright(1); // 中 right half (the spacer cell)
  const letterA = scanBright(2);    // normal glyph renders
  const blank = scanBright(3);      // a real blank space → ~0

  window.__proof = {
    cell: [CW, CH],
    leadHalf, spacerHalf, letterA, blank,
    checks: {
      leadRenders: leadHalf > 0,
      spacerRenders: spacerHalf > 0, // the key: spacer is NOT blank
      letterRenders: letterA > 0,
      blankIsBlank: blank === 0,
    },
    ok: leadHalf > 0 && spacerHalf > 0 && letterA > 0 && blank === 0,
  };
  window.__done = true;
</script>
