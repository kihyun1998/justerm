<!doctype html>
<meta charset="utf-8" />
<title>justerm-renderer proof — wide (#268) + guard-band/ink-scan (#288)</title>
<style>
  body { margin: 0; background: #000; }
  #c { display: block; image-rendering: pixelated; }
</style>
<!--
  Proof harness. readPixels reads coverage straight off the canvas (bottom-left origin; row 0
  is drawn at the top, so its band is [H-CH, H)). window.__proof carries the assertions.

  #268 wide/CJK: '中' (wide lead) + its spacer both carry glyph coverage (the spacer is NOT
  blank), and 'A' renders, a real space is blank.

  #288 guard band + ink-scan: two box-drawing '─' in adjacent cells form a CONTINUOUS line
  across the cell seam. This only holds if the padded atlas cell's *content* maps edge-to-edge
  (the shader insets the texcoord past the guard band); a transparent-margin bug would leave a
  dark notch at every seam. Build: wasm-pack build --target web --dev --out-dir pkg
-->
<canvas id="c" width="320" height="120"></canvas>
<script type="module">
  import init, { JustermRenderer } from "../pkg/justerm_renderer.js";

  const WIDE_CHAR = 1 << 8, WIDE_SPACER = 1 << 9;
  const FG = 0xffffff, BG = 0x1e1e2e;
  await init();

  const palette = new Uint32Array(256);
  const r = new JustermRenderer("#c", palette, FG, BG);
  const CW = r.cell_width(), CH = r.cell_height();

  // 6 cells, 1 row: [─][─][A][中(lead)][spacer][space]
  const COLS = 6, H = 120;
  r.resize(COLS * CW, H);
  const cps   = new Uint32Array([0x2500, 0x2500, 0x41, 0x4e2d, 0x20,        0x20]);
  const flags = new Uint16Array([0,      0,      0,    WIDE_CHAR, WIDE_SPACER, 0]);
  const zeros = new Uint32Array(COLS).fill(0);
  r.apply_frame(COLS, 1, zeros, zeros, cps, flags);
  r.render();

  const gl = document.querySelector("#c").getContext("webgl2");
  // Read a `w`-wide strip at column `x0` over the top row band; return {buf,w}.
  const readStrip = (x0, w) => {
    const buf = new Uint8Array(w * CH * 4);
    gl.readPixels(x0, H - CH, w, CH, gl.RGBA, gl.UNSIGNED_BYTE, buf);
    return { buf, w };
  };
  const litAt = ({ buf, w }, x, y) => buf[(y * w + x) * 4] > 150; // R channel of fg-ish px
  const countLit = (strip) => {
    let n = 0;
    for (let i = 0; i < strip.buf.length; i += 4) if (strip.buf[i] > 150) n++;
    return n;
  };

  const cell = (col) => readStrip(col * CW, CW);
  const leadHalf = countLit(cell(3));   // 中 left half
  const spacerHalf = countLit(cell(4)); // 中 right half (the spacer cell)
  const letterA = countLit(cell(2));
  const blank = countLit(cell(5));

  // Box connection: read the two '─' cells as one 2*CW strip; find the horizontal-line row
  // (most lit), then require the seam columns (CW-1 and CW) both lit → the line bridges cells.
  const box = readStrip(0, 2 * CW);
  let lineRow = 0, best = -1;
  for (let y = 0; y < CH; y++) {
    let n = 0;
    for (let x = 0; x < 2 * CW; x++) if (litAt(box, x, y)) n++;
    if (n > best) { best = n; lineRow = y; }
  }
  const seamBridged = litAt(box, CW - 1, lineRow) && litAt(box, CW, lineRow);

  window.__proof = {
    cell: [CW, CH],
    leadHalf, spacerHalf, letterA, blank, lineRow, seamBridged,
    checks: {
      // #268 regression
      leadRenders: leadHalf > 0,
      spacerRenders: spacerHalf > 0,
      letterRenders: letterA > 0,
      blankIsBlank: blank === 0,
      // #288
      boxSeamBridged: seamBridged,
    },
    ok:
      leadHalf > 0 && spacerHalf > 0 && letterA > 0 && blank === 0 && seamBridged,
  };
  window.__done = true;
</script>
