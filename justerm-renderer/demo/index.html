<!doctype html>
<meta charset="utf-8" />
<title>justerm-renderer glyph proof (#264)</title>
<style>
  body { margin: 0; background: #000; }
  #c { display: block; image-rendering: pixelated; }
</style>
<!--
  Glyph proof harness (#264): loads the real justerm-renderer wasm, applies a frame with
  text (codepoints per cell), and lets the renderer rasterise glyphs on demand via
  OffscreenCanvas + upload them to the atlas texture array. readPixels on the same WebGL2
  context proves the glyph coverage composited fg over bg: '█' (full block) = fg, ' ' = bg,
  and 'A' is a mix (a real letter shape). Build: wasm-pack build --target web --dev --out-dir pkg
-->
<canvas id="c" width="320" height="200"></canvas>
<script type="module">
  import init, { JustermRenderer } from "../pkg/justerm_renderer.js";

  const FG = 0xffffff, BG = 0x1e1e2e;
  const H = 200;
  await init();

  const palette = new Uint32Array(256);
  const r = new JustermRenderer("#c", palette, FG, BG);
  r.resize(320, H);
  const CW = r.cell_width(), CH = r.cell_height();

  // Row 0: █ (full block), space, A, B — all default bg, default fg (white).
  const cps = new Uint32Array([0x2588, 0x20, 0x41, 0x42]);
  const zeros = new Uint32Array([0, 0, 0, 0]);
  r.apply_frame(4, 1, zeros, zeros, cps);
  r.render();

  const gl = document.querySelector("#c").getContext("webgl2");
  const readAt = (x, yTop) => {
    const px = new Uint8Array(4);
    gl.readPixels(x, H - 1 - yTop, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
    return [px[0], px[1], px[2]];
  };
  const center = (col) => readAt(col * CW + (CW >> 1), CH >> 1);

  // Scan cell 'A' for a fg-ish (bright) and a bg-ish (dark) pixel → proves a real glyph.
  const scanMixed = (col) => {
    const w = CW, h = CH, x0 = col * CW;
    const buf = new Uint8Array(w * h * 4);
    gl.readPixels(x0, H - h, w, h, gl.RGBA, gl.UNSIGNED_BYTE, buf);
    let hasBright = false, hasDark = false;
    for (let i = 0; i < buf.length; i += 4) {
      if (buf[i] > 200) hasBright = true;
      if (buf[i] < 80) hasDark = true;
    }
    return { hasBright, hasDark };
  };

  const near = (a, b) => a.every((v, i) => Math.abs(v - b[i]) <= 12);
  const block = center(0);   // █ → fg
  const space = center(1);   // ' ' → bg
  const letterA = scanMixed(2);

  window.__proof = {
    cell: [CW, CH],
    block, blockIsFg: near(block, [255, 255, 255]),
    space, spaceIsBg: near(space, [30, 30, 46]),
    letterA, letterMixed: letterA.hasBright && letterA.hasDark,
    ok: near(block, [255, 255, 255]) && near(space, [30, 30, 46]) && letterA.hasBright && letterA.hasDark,
  };
  window.__done = true;
</script>
