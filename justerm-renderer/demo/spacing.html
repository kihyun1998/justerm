<!doctype html>
<meta charset="utf-8" />
<title>justerm-renderer proof — letterSpacing / lineHeight / builtin blocks + box drawing (#338, #359, #365)</title>
<style>
  body { margin: 0; background: #000; }
  #c { display: block; image-rendering: pixelated; }
</style>
<!--
  The grid cell and the glyph box are two rectangles (#338), and the atlas slot is the padded CELL
  (#359). Two things must hold, and they pull in opposite directions:

    - A BLOCK element (`U+2580`-`U+259F`) is meant to TILE. `█` must fill the cell edge to edge at any
      spacing, or a TUI's solid-fill regions grow grid lines. It never reaches the font; the builtin
      draws it to the cell.
    - A LETTER must NOT stretch. `M`'s ink keeps the size the rasteriser measured and merely MOVES to
      its place inside the wider cell — by exactly `floor(dx/2)` across and `ceil(dy/2)` down.

  Measuring the move rather than the fill is what pins the placement. And `█` fills its own ink box by
  definition — the rasteriser measures the cell BY ink-scanning it — so at the defaults the two agree,
  which is how AC 4 ("defaults reproduce today's pixels") is checked here and by the other 46 proofs.

  The runner sweeps dpr 1 / 1.1 / 1.5 / 2, which is the point: `letterSpacing` is CSS px, so the DEVICE
  gap tracks the density (`round(spacing * dpr)`), unlike xterm's device-px option
  (`WebglRenderer.ts:671`). Only 1.5 and 2 tell the two rules apart — at 1 and 1.1 `round(2 * dpr)` is
  2 either way.
  Build: wasm-pack build --target web --dev --out-dir pkg
-->
<canvas id="c" width="64" height="64"></canvas>
<script type="module">
  import init, { JustermRenderer } from "../pkg/justerm_renderer.js";
  import { readRect } from "./proof.js";
  await init();

  const palette = new Uint32Array(256);
  const r = new JustermRenderer("#c", palette, 0xffffff, 0x000000);
  const canvas = document.querySelector("#c");
  const gl = canvas.getContext("webgl2");
  const dpr = window.devicePixelRatio;

  // With both options at their defaults the cell IS the glyph box (`device_cell` is the identity).
  const charW = r.cell_width(), charH = r.cell_height();

  /** Draw one cell of `cp` and report the extent and placement of its ink, in device px. */
  const inkRun = (cp) => {
    r.resize(1, 1);
    r.apply_frame(1, 1, new Uint32Array(1), new Uint32Array(1), new Uint32Array([cp]), new Uint16Array(1), true);
    r.render();
    const [w, h] = [gl.drawingBufferWidth, gl.drawingBufferHeight];
    const { buf } = readRect(gl, { x: 0, y: 0, w, h }); // same task as render()
    const lit = (x, y) => buf[(y * w + x) * 4 + 1] > 150;
    const cols = [], rows = [];
    for (let x = 0; x < w; x++) for (let y = 0; y < h; y++) if (lit(x, y)) { cols.push(x); break; }
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) if (lit(x, y)) { rows.push(y); break; }
    // readPixels counts from the BOTTOM; the glyph's offset is measured from the cell's TOP.
    const topGap = rows.length ? h - 1 - rows[rows.length - 1] : -1;
    return { w, h, litCols: cols.length, litRows: rows.length, leftGap: cols[0] ?? -1, topGap };
  };
  const BLOCK = 0x2588, LETTER = 0x4d; // `█`, `M`

  /** `一`: one continuous horizontal stroke across a wide lead + spacer. */
  const WIDE_CHAR = 1 << 8, WIDE_CHAR_SPACER = 1 << 9;
  const wideRun = () => {
    r.resize(2, 1);
    r.apply_frame(2, 1, new Uint32Array(2), new Uint32Array(2),
      new Uint32Array([0x4e00, 0x20]), new Uint16Array([WIDE_CHAR, WIDE_CHAR_SPACER]), true);
    r.render();
    const [w, h] = [gl.drawingBufferWidth, gl.drawingBufferHeight];
    const { buf } = readRect(gl, { x: 0, y: 0, w, h });
    let row = 0, most = -1;
    for (let y = 0; y < h; y++) {
      let n = 0;
      for (let x = 0; x < w; x++) if (buf[(y * w + x) * 4 + 1] > 150) n++;
      if (n > most) { most = n; row = y; }
    }
    let s = "";
    for (let x = 0; x < w; x++) s += buf[(row * w + x) * 4 + 1] > 150 ? "#" : ".";
    const first = s.indexOf("#"), last = s.lastIndexOf("#");
    const interiorGaps = first < 0 ? [-1] : (s.slice(first, last + 1).match(/\.+/g) ?? []).map((g) => g.length);
    return { w, lit: most, interiorGaps, leftGap: first };
  };

  /** Two `🬂` (BLOCK SEXTANT-12, the upper third) side by side: the top rows must run unbroken. */
  const SEXTANT_UPPER_THIRD = 0x1FB02;
  const sextantRun = () => {
    r.resize(2, 1);
    r.apply_frame(2, 1, new Uint32Array(2), new Uint32Array(2),
      new Uint32Array([SEXTANT_UPPER_THIRD, SEXTANT_UPPER_THIRD]), new Uint16Array(2), true);
    r.render();
    const [w, h] = [gl.drawingBufferWidth, gl.drawingBufferHeight];
    const { buf } = readRect(gl, { x: 0, y: 0, w, h });
    const rowLit = (y) => { let n = 0; for (let x = 0; x < w; x++) if (buf[(y * w + x) * 4 + 1] > 150) n++; return n; };
    // readPixels is bottom-origin, so top-origin row `t` is device row `h - 1 - t`.
    const litFromTop = (t) => rowLit(h - 1 - t);
    let topRun = 0;
    while (topRun < h && litFromTop(topRun) > 0) topRun++;
    let litRows = 0;
    for (let t = 0; t < h; t++) if (litFromTop(t) > 0) litRows++;
    return { w, h, topRow: litFromTop(0), topRun, litRows };
  };
  const sextantBase = sextantRun();

  /** A 2x2 box frame `┌┐ / └┘`: four corners whose arms must meet across BOTH cell seams, so the
   *  border is a single connected loop enclosing an empty interior — at any spacing (#365). */
  const boxFrame = () => {
    r.resize(2, 2);
    r.apply_frame(2, 2, new Uint32Array(4), new Uint32Array(4),
      new Uint32Array([0x250c, 0x2510, 0x2514, 0x2518]), new Uint16Array(4), true);
    r.render();
    const [w, h] = [gl.drawingBufferWidth, gl.drawingBufferHeight];
    const { buf } = readRect(gl, { x: 0, y: 0, w, h });
    const lit = (x, y) => buf[(y * w + x) * 4 + 1] > 150;
    // Count 4-connected lit components: a gap at any seam splits the loop into more than one.
    const seen = new Uint8Array(w * h);
    let comps = 0, litCount = 0;
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) if (lit(x, y)) litCount++;
    for (let sy = 0; sy < h; sy++) for (let sx = 0; sx < w; sx++) {
      if (!lit(sx, sy) || seen[sy * w + sx]) continue;
      comps++;
      const stack = [[sx, sy]];
      while (stack.length) {
        const [x, y] = stack.pop();
        const i = y * w + x;
        if (seen[i] || !lit(x, y)) continue;
        seen[i] = 1;
        if (x > 0) stack.push([x - 1, y]);
        if (x + 1 < w) stack.push([x + 1, y]);
        if (y > 0) stack.push([x, y - 1]);
        if (y + 1 < h) stack.push([x, y + 1]);
      }
    }
    // The frame encloses an empty interior — its geometric centre is unlit, so it is a frame, not a
    // solid fill that would pass the connectivity check trivially.
    const hollow = !lit(Math.floor(w / 2), Math.floor(h / 2));
    return { w, h, comps, litCount, hollow };
  };
  const frameBase = boxFrame();
  // AC: the frame stays joined at letterSpacing = 4 CSS px AND lineHeight = 1.6 together.
  r.setLetterSpacing(4);
  r.setLineHeight(1.6);
  const frameSpaced = boxFrame();
  r.setLetterSpacing(0);
  r.setLineHeight(1);

  const blockBase = inkRun(BLOCK);
  const letterBase = inkRun(LETTER);
  const wideBase = wideRun();

  // --- letterSpacing: 2 CSS px, so `round(2 * dpr)` device px, split floor-left / rest-right.
  const SPACING = 2;
  r.setLetterSpacing(SPACING);
  const blockSpaced = inkRun(BLOCK);
  const sextantSpaced = sextantRun();
  const letterSpaced = inkRun(LETTER);
  const wideSpaced = wideRun();
  const dx = Math.round(SPACING * dpr);
  r.setLetterSpacing(0);

  // --- lineHeight: 1.5, so `floor(charH * 1.5)`, the glyph centred with the odd pixel above.
  const LH = 1.5;
  r.setLineHeight(LH);
  const blockTall = inkRun(BLOCK);
  const letterTall = inkRun(LETTER);
  const cellH = Math.floor(charH * LH);
  const dy = cellH - charH;

  // --- the policy must survive a DPR change (#322) and a context restore (#269).
  r.setDevicePixelRatio(dpr * 2);
  const afterDpr = { cellW: r.cell_width(), cellH: r.cell_height() };
  r.setLineHeight(1); // read the NEW glyph box back, without having re-applied the policy first
  const charH2 = r.cell_height();
  r.setLineHeight(LH);
  r.setDevicePixelRatio(dpr); // back, so the restore check runs at the sweep's own density

  const lose = gl.getExtension("WEBGL_lose_context");
  const once = (event) => new Promise((res) => canvas.addEventListener(event, res, { once: true }));
  const lost = once("webglcontextlost");
  lose.loseContext();
  await lost;
  // Chrome only permits `restoreContext()` once the `webglcontextlost` dispatch has fully unwound —
  // awaiting the event is a microtask and is NOT enough. Yield a real macrotask, as `context-loss.html`
  // documents.
  await new Promise((res) => setTimeout(res, 0));
  const restored = once("webglcontextrestored");
  lose.restoreContext();
  await restored;
  r.render(); // the frame after `webglcontextrestored` rebuilds the pipeline + atlas
  const afterRestore = inkRun(BLOCK);

  // --- a cell the ATLAS TEXTURE cannot hold must be shrunk, not silently break the atlas (#359).
  // The atlas is `padded_w x padded_h * 32`. Ask for a 1000x line height and the texture exceeds
  // MAX_TEXTURE_SIZE; `glTexStorage3D` raises GL_INVALID_VALUE without throwing, glow does not look,
  // and a storage-less sampler answers alpha 1 — so EVERY glyph renders as a solid block. Measured
  // before the fix: `M` came back fully lit. A proof drawn with `█` alone cannot see that.
  const maxTex = gl.getParameter(gl.MAX_TEXTURE_SIZE);
  r.setLineHeight(1000);
  const huge = { cellH: r.cell_height(), letter: inkRun(LETTER) };
  const letterCoverage = huge.letter.litCols * huge.letter.litRows / (huge.letter.w * huge.letter.h);
  r.setLineHeight(1);

  // --- a setter called WHILE the context is lost must not destroy the grid (#338/#339).
  r.resize(20, 6);
  const gridBefore = [r.cols(), r.rows()];
  const lost2 = once("webglcontextlost");
  lose.loseContext();
  await lost2;
  r.setLineHeight(2);
  r.setLetterSpacing(1);
  const gridWhileLost = [r.cols(), r.rows()];
  await new Promise((res) => setTimeout(res, 0));
  const restored2 = once("webglcontextrestored");
  lose.restoreContext();
  await restored2;
  r.render();
  const gridAfter = [r.cols(), r.rows()];

  window.__proof = {
    dpr, charW, charH, dx, dy, cellH, charH2, afterDpr,
    blockBase, blockSpaced, blockTall, letterBase, letterSpaced, letterTall,
    wideBase, wideSpaced, afterRestore, gridBefore, gridWhileLost, gridAfter,
    maxTex, huge, letterCoverage, sextantBase, sextantSpaced, frameBase, frameSpaced,
    checks: {
      // The adopted cell fits the atlas, and the consumer can read back what it got (#339's contract).
      anUnholdableCellIsShrunkToWhatTheAtlasCanHold:
        huge.cellH <= Math.floor(maxTex / 32) - 2 && huge.cellH > charH,
      // ...and the atlas still works: `M` is a letter, not a solid rectangle.
      andTheAtlasStillHoldsRealGlyphs: letterCoverage < 0.5,

      // AC 4: at the defaults the builtin `█` covers exactly the cell the rasteriser ink-scanned it
      // to be. That is why the other 46 proofs' pixels are unchanged.
      theDefaultCellIsTheBlockGlyph:
        blockBase.w === charW && blockBase.h === charH &&
        blockBase.litCols === charW && blockBase.litRows === charH,

      // #359: a BLOCK element fills the cell, whatever the spacing. Masked to its ink box it seamed:
      // `██` grew vertical lines, and `lineHeight` a horizontal one.
      aBlockFillsAWiderCell: blockSpaced.litCols === blockSpaced.w && blockSpaced.litRows === blockSpaced.h,
      // #361: a sextant is a 2x3 mosaic drawn to the cell, so `🬂🬂` (BLOCK SEXTANT-12, the upper
      // third) runs unbroken across the cell boundary at any spacing. Its ink is a contiguous run
      // from the TOP — all of it, nothing below — and it is a THIRD, not the half `▀` would give.
      // Stated structurally rather than as `round(h/3)`, which would just recompute the code.
      aSextantTilesAcrossCells:
        sextantBase.topRow === sextantBase.w &&
        sextantBase.topRun === sextantBase.litRows &&
        sextantBase.topRun >= 1 && sextantBase.topRun * 2 < sextantBase.h,
      aSextantStillTilesWhenTheCellWidens:
        sextantSpaced.topRow === sextantSpaced.w &&
        sextantSpaced.topRun === sextantSpaced.litRows &&
        sextantSpaced.topRun * 2 < sextantSpaced.h &&
        sextantSpaced.w === sextantBase.w + 2 * dx,
      aBlockFillsATallerCell: blockTall.litCols === blockTall.w && blockTall.litRows === blockTall.h,

      spacingWidensTheCell: blockSpaced.w === charW + dx && dx >= 1,
      lineHeightRaisesTheCell: blockTall.h === cellH && dy >= 1,

      // #338: a LETTER is not stretched. Its ink keeps the size the rasteriser measured...
      aLetterKeepsItsInkWhenTheCellWidens:
        letterSpaced.litCols === letterBase.litCols && letterSpaced.litRows === letterBase.litRows,
      aLetterKeepsItsInkWhenTheCellGrowsTaller:
        letterTall.litCols === letterBase.litCols && letterTall.litRows === letterBase.litRows,
      // ...and merely MOVES, by exactly what `glyph_offset` computes: floor across, round down.
      aLetterMovesByHalfTheHorizontalSlack:
        letterSpaced.leftGap - letterBase.leftGap === Math.floor(dx / 2),
      aLetterMovesByHalfTheVerticalSlack:
        letterTall.topGap - letterBase.topGap === Math.ceil(dy / 2),

      // A wide glyph is cut in half at the cell boundary. Since #359 bakes it as ONE bitmap across
      // its two-cell advance, the cut cannot tear it — that was #338's bug, where the shader placed
      // each half independently and the slack meant for the outside of `一` opened a `dx`-px hole
      // through its middle. These two stay as regression tripwires; they can no longer fail on their
      // own, which is the point.
      theWideStrokeIsContinuousByDefault: wideBase.interiorGaps.length === 0 && wideBase.lit > 2,
      spacingDoesNotTearAWideGlyph: wideSpaced.interiorGaps.length === 0,
      spacingDoesNotStretchAWideGlyph: wideSpaced.lit === wideBase.lit,
      theWideCellPairGrewByTwiceTheSpacing: wideSpaced.w === wideBase.w + 2 * dx,
      // What CAN fail: the letter must be centred in its own two-cell advance, so its ink moves right
      // by the WHOLE slack `dx`, not by `floor(dx/2)` as a narrow glyph does. (`2*cell - 2*phys` is
      // `2*dx`, split `dx` each side.)
      aWideGlyphIsCentredInItsTwoCellAdvance: wideSpaced.leftGap - wideBase.leftGap === dx,

      // The policy is not re-derived from the atlas: it outlives a DPR change (#322)...
      lineHeightSurvivesADprChange: afterDpr.cellH === Math.floor(charH2 * LH) && charH2 > charH,
      // ...and a context restore (#269), which rebuilds the pipeline and re-bakes every glyph — the
      // builtin blocks among them, at the cell the policy still asks for.
      lineHeightSurvivesAContextRestore:
        afterRestore.h === cellH && afterRestore.litRows === cellH,

      // Measured: without the lost-context guard this reads `[1,1]` while lost AND after restore.
      aSetterOnALostContextKeepsTheGrid:
        gridWhileLost[0] === gridBefore[0] && gridWhileLost[1] === gridBefore[1] &&
        gridAfter[0] === gridBefore[0] && gridAfter[1] === gridBefore[1],
      contextSurvived: !gl.isContextLost(),

      // #365: box drawing is drawn to the CELL, like the blocks, so a frame's corners meet across the
      // cell seams and the border is ONE connected loop around an empty interior...
      aBoxFrameIsOneJoinedLoopAroundAnEmptyInterior:
        frameBase.comps === 1 && frameBase.litCount > 0 && frameBase.hollow,
      // ...and it STAYS one loop when letterSpacing and lineHeight widen and heighten every cell —
      // the join the font path loses (a `─` stops reaching its neighbour) is the whole point of the
      // builtin. The cell must actually have grown, or the check proves nothing.
      aBoxFrameStaysJoinedWhenTheCellsGrow:
        frameSpaced.comps === 1 && frameSpaced.hollow &&
        frameSpaced.w > frameBase.w && frameSpaced.h > frameBase.h,
    },
  };
  window.__proof.ok = Object.values(window.__proof.checks).every(Boolean);
  window.__done = true;
</script>
