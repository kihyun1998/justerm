<!doctype html>
<meta charset="utf-8" />
<title>justerm-renderer proof — letterSpacing / lineHeight (#338)</title>
<style>
  body { margin: 0; background: #000; }
  #c { display: block; image-rendering: pixelated; }
</style>
<!--
  #338 proof: the grid cell and the glyph box stop being the same rectangle.

  `█` fills its own ink box by definition — the rasteriser measures the cell BY ink-scanning it. So
  the count of lit columns in a cell IS the glyph box's width, and the count of lit rows IS its
  height. A cell that grew while the lit run stayed the same is a cell that SPACED the glyph; a cell
  that grew while the lit run grew with it is a cell that STRETCHED it. That is the whole question.

  The runner sweeps this at dpr 1 / 1.1 / 1.5 / 2, which is the point: `letterSpacing` is CSS px, so
  the DEVICE gap must scale with the density (`round(spacing * dpr)`), unlike xterm's device-px
  option (`WebglRenderer.ts:671`). Only dpr 1.5 and 2 can tell the two rules apart — at 1 and 1.1,
  `round(2 * dpr)` is 2 either way.

  KNOWN GAP (#359): block and box-drawing glyphs are masked to their ink box like every other glyph,
  so under non-default spacing they no longer tile — `██` seams, `──` breaks. Both references draw
  U+2500-259F at CELL size ahead of the font. The checks below pin "the glyph is not stretched",
  which is true and necessary; they must not be read as "the cell looks right for a block element".
  Build: wasm-pack build --target web --dev --out-dir pkg
-->
<canvas id="c" width="64" height="64"></canvas>
<script type="module">
  import init, { JustermRenderer } from "../pkg/justerm_renderer.js";
  import { readRect } from "./proof.js";
  await init();

  const palette = new Uint32Array(256);
  const r = new JustermRenderer("#c", palette, 0xffffff, 0x000000);
  const canvas = document.querySelector("#c");
  const gl = canvas.getContext("webgl2");
  const dpr = window.devicePixelRatio;

  // With both options at their defaults the cell IS the glyph box (`device_cell` is the identity).
  const charW = r.cell_width(), charH = r.cell_height();

  /** Draw a single `█` cell and report which device columns / rows have any ink. */
  const inkRun = () => {
    r.resize(1, 1);
    r.apply_frame(1, 1, new Uint32Array(1), new Uint32Array(1), new Uint32Array([0x2588]), new Uint16Array(1), true);
    r.render();
    const [w, h] = [gl.drawingBufferWidth, gl.drawingBufferHeight];
    const { buf } = readRect(gl, { x: 0, y: 0, w, h }); // same task as render()
    const lit = (x, y) => buf[(y * w + x) * 4 + 1] > 150;
    const cols = [], rows = [];
    for (let x = 0; x < w; x++) for (let y = 0; y < h; y++) if (lit(x, y)) { cols.push(x); break; }
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) if (lit(x, y)) { rows.push(y); break; }
    // readPixels counts from the BOTTOM; the glyph's offset is measured from the cell's TOP.
    const topGap = rows.length ? h - 1 - rows[rows.length - 1] : -1;
    return { w, h, litCols: cols.length, litRows: rows.length, leftGap: cols[0] ?? -1, topGap };
  };

  const base = inkRun();

  /** Draw `一` (one continuous horizontal stroke) as a wide lead + spacer across two cells. */
  const WIDE_CHAR = 1 << 8, WIDE_CHAR_SPACER = 1 << 9;
  const wideRun = () => {
    r.resize(2, 1);
    r.apply_frame(2, 1, new Uint32Array(2), new Uint32Array(2),
      new Uint32Array([0x4e00, 0x20]), new Uint16Array([WIDE_CHAR, WIDE_CHAR_SPACER]), true);
    r.render();
    const [w, h] = [gl.drawingBufferWidth, gl.drawingBufferHeight];
    const { buf } = readRect(gl, { x: 0, y: 0, w, h }); // same task as render()
    // The row with the most ink is the stroke; a tear shows up as an unlit run inside it.
    let row = 0, most = -1;
    for (let y = 0; y < h; y++) {
      let n = 0;
      for (let x = 0; x < w; x++) if (buf[(y * w + x) * 4 + 1] > 150) n++;
      if (n > most) { most = n; row = y; }
    }
    let s = "";
    for (let x = 0; x < w; x++) s += buf[(row * w + x) * 4 + 1] > 150 ? "#" : ".";
    const first = s.indexOf("#"), last = s.lastIndexOf("#");
    const interiorGaps = first < 0 ? [-1] : (s.slice(first, last + 1).match(/\.+/g) ?? []).map((g) => g.length);
    return { w, lit: most, interiorGaps, span: last - first + 1 };
  };
  const wideBase = wideRun();

  // --- letterSpacing: 2 CSS px, so `round(2 * dpr)` device px, split floor-left / rest-right.
  const SPACING = 2;
  r.setLetterSpacing(SPACING);
  const spaced = inkRun();
  const wideSpaced = wideRun();
  const dx = Math.round(SPACING * dpr);
  r.setLetterSpacing(0);

  // --- lineHeight: 1.5, so `floor(charH * 1.5)`, glyph centred with the odd pixel above.
  const LH = 1.5;
  r.setLineHeight(LH);
  const tall = inkRun();
  const cellH = Math.floor(charH * LH);
  const dy = cellH - charH;

  // --- the policy must survive a DPR change (#322) and a context restore (#269).
  r.setDevicePixelRatio(dpr * 2);
  const afterDpr = { cellW: r.cell_width(), cellH: r.cell_height() };
  r.setLineHeight(1); // read the NEW glyph box back, without having re-applied the policy first
  const charH2 = r.cell_height();
  r.setLineHeight(LH);
  r.setDevicePixelRatio(dpr); // back, so the restore check runs at the sweep's own density

  const lose = gl.getExtension("WEBGL_lose_context");
  const once = (event) => new Promise((res) => canvas.addEventListener(event, res, { once: true }));
  const lost = once("webglcontextlost");
  lose.loseContext();
  await lost;
  // Chrome only permits `restoreContext()` once the `webglcontextlost` dispatch has fully unwound —
  // awaiting the event is a microtask and is NOT enough (`INVALID_OPERATION: context restoration not
  // allowed`). Yield a real macrotask, exactly as `context-loss.html` documents.
  await new Promise((res) => setTimeout(res, 0));
  const restored = once("webglcontextrestored");
  lose.restoreContext();
  await restored;
  r.render(); // the frame after `webglcontextrestored` rebuilds the pipeline + atlas
  const afterRestore = inkRun();

  // --- a setter called WHILE the context is lost must not destroy the grid.
  // `resize` reads `drawingBufferWidth` back (#339); on a lost context that is 0, so the
  // adopt-what-fits loop shrinks to 1x1 and `restore` rebuilds the buffer from the wreckage.
  // `set_device_pixel_ratio` guarded this from the start; the two new setters did not (#338).
  r.resize(20, 6);
  const gridBefore = [r.cols(), r.rows()];
  const lost2 = once("webglcontextlost");
  lose.loseContext();
  await lost2;
  r.setLineHeight(2);       // <- on a lost context
  r.setLetterSpacing(1);    // <- ditto
  const gridWhileLost = [r.cols(), r.rows()];
  await new Promise((res) => setTimeout(res, 0));
  const restored2 = once("webglcontextrestored");
  lose.restoreContext();
  await restored2;
  r.render();
  const gridAfter = [r.cols(), r.rows()];

  window.__proof = {
    dpr, charW, charH, base, spaced, tall, dx, dy, cellH, afterDpr, charH2, afterRestore,
    wideBase, wideSpaced, gridBefore, gridWhileLost, gridAfter,
    checks: {
      // Defaults: the cell IS the glyph box, and `█` fills it edge to edge (AC 4).
      theDefaultCellIsTheGlyphBox:
        base.w === charW && base.h === charH && base.litCols === charW && base.litRows === charH,

      // letterSpacing widens the CELL by `round(spacing * dpr)` device px. `spaced.w` comes from the
      // RENDERER; `dx` is what the page expects. That is the CSS-px claim, and the density sweep is
      // what tests it: at dpr 1 and 1.1 `round(2 * dpr)` is 2, exactly what xterm's device-px rule
      // would give, so only 1.5 and 2 can tell the two apart (verified by mutation: 2 of 4 redden).
      spacingWidensTheCell: spaced.w === charW + dx && dx >= 1,
      // ...without stretching the GLYPH: the ink run is still exactly one glyph box wide, and it is
      // not taller either.
      //
      // Read this narrowly. `█` is a BLOCK element, and a block element is supposed to tile: under
      // spacing it now leaves a seam, which is a real defect tracked in #359 (both references draw
      // U+2500-259F at CELL size, ahead of the font). What this check pins is that the glyph is not
      // STRETCHED — a stretched `█` would be worse and would hide #359 behind a full-looking cell.
      spacingDoesNotStretchTheGlyph: spaced.litCols === charW && spaced.litRows === charH,
      // ...centred, with the odd device pixel on the right (xterm's `floor(letterSpacing / 2)`).
      spacingCentresTheGlyph: spaced.leftGap === Math.floor(dx / 2),

      // A WIDE glyph is stored as two half-slots, one per cell. Inset each half by the usual `dx/2`
      // and the letter tears down its middle: reproduced in Chromium, `一`'s continuous stroke came
      // back `...#######....#######...`. The letter must be centred in its TWO-cell advance, so the
      // slack lands outside it. `█` alone can never see this — it is a narrow glyph (#338).
      theWideStrokeIsContinuousByDefault: wideBase.interiorGaps.length === 0 && wideBase.lit > 2,
      spacingDoesNotTearAWideGlyph: wideSpaced.interiorGaps.length === 0,
      // ...and does not stretch it either: the stroke spans the same ink either way.
      spacingDoesNotStretchAWideGlyph: wideSpaced.lit === wideBase.lit,
      // The two cells grew, so the letter really was placed inside a wider advance.
      theWideCellPairGrewByTwiceTheSpacing: wideSpaced.w === wideBase.w + 2 * dx,

      // lineHeight raises the CELL...
      lineHeightRaisesTheCell: tall.h === cellH && dy >= 1,
      // ...without stretching the glyph. Same narrow reading as above: the renderer measures its own
      // cell by ink-scanning `█`, so at `lineHeight = 1.5` the glyph that DEFINES the cell no longer
      // fills it. That seam is #359, not this check.
      lineHeightDoesNotStretchTheGlyph: tall.litRows === charH && tall.litCols === charW,
      // ...and centres it vertically, the odd pixel above (xterm's `round((cell - char) / 2)`).
      lineHeightCentresTheGlyph: tall.topGap === Math.ceil(dy / 2),

      // The policy is not re-derived from the atlas: it outlives a DPR change (#322)...
      lineHeightSurvivesADprChange: afterDpr.cellH === Math.floor(charH2 * LH) && charH2 > charH,
      // ...and a context restore (#269), which rebuilds the pipeline and re-bakes every glyph.
      lineHeightSurvivesAContextRestore:
        afterRestore.h === cellH && afterRestore.litRows === charH && afterRestore.topGap === Math.ceil(dy / 2),
      // Measured: without the guard this reads `[1,1]` while lost AND after the restore.
      aSetterOnALostContextKeepsTheGrid:
        gridWhileLost[0] === gridBefore[0] && gridWhileLost[1] === gridBefore[1] &&
        gridAfter[0] === gridBefore[0] && gridAfter[1] === gridBefore[1],
      contextSurvived: !gl.isContextLost(),
    },
  };
  window.__proof.ok = Object.values(window.__proof.checks).every(Boolean);
  window.__done = true;
</script>
