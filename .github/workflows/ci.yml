name: CI

# The systematic net (#8 / #15): every push and PR runs the full test suite,
# clippy, and a format check, so VT-compliance slices verify against it from the
# start (architecture.md: pull the conformance net early).

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: test + clippy + fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Rust version is pinned in rust-toolchain.toml (single source of truth);
      # mirrored here so the action installs exactly that toolchain + components.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable-branch action
        with:
          toolchain: "1.96.0"
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (warnings fail)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test (unit + integration + doc)
        run: cargo test

  # Supply-chain gate: just-shield verifies every action this repo ingests
  # (SHA pinning, least-privilege permissions, known-compromised versions)
  # before merge. See ADR-0006.
  supply-chain:
    name: supply-chain (just-shield)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: kihyun1998/just-shield@bfe605c359607bddb3fcbc04ee568e0ff4f60bf3 # v0.3.0
        with:
          strict: true
