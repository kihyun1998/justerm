# Publish the justerm-core crate to crates.io (the Rust-consumer track).
#
# Sibling of publish-wasm.yml: the SAME `vX.Y.Z` tag publishes both the crate (here) and the
# justerm-wasm-decode npm artifact (there), so the two registries stay version-locked from one tag. The
# workspace version is the single source — bump `[workspace.package] version`, tag the matching
# `vX.Y.Z`, and both publish at that version.
#
# Setup required once by the maintainer: add a `CARGO_REGISTRY_TOKEN` repository secret (a crates.io
# API token with publish rights). `cargo publish` reads it from the env automatically.
#
# Note: a crates.io version cannot be re-published. `justerm-core` is a newly-named crate (the rename
# from `justerm`, #100); its first publish is v0.6.0 via this workflow, so there is no prior-version
# collision to avoid. Re-tagging an already-published version would fail here ("already uploaded").
name: publish-crate

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # No build cache here: publishing runs only on a `v*` tag (rare), so a cache buys little, and
      # just-shield R6 flags a third-party action sharing a job that holds the publish token. Dropping
      # rust-cache keeps `CARGO_REGISTRY_TOKEN` away from any third-party action (ADR-0006 blast-radius).

      # This publish snapshots the README onto the registry front page, and nothing on the way there
      # gates it (theflow Step 6 — the published README is a behavior surface). The check rejects one
      # narrow class: claims that expire ("under construction", "lands in #N"). That is the class
      # that let justerm-renderer ship a "the GPU pipeline lands in #260+" scaffold banner through
      # six published versions. Constants a README *quotes* are pinned separately, by unit tests next
      # to the crate that owns them, so those fail on every PR instead of here.
      - name: Verify the README makes no expiring claim
        run: node .github/scripts/check-published-readme.mjs justerm-core/README.md

      # Version-lockstep gate: the tag (minus `v`) must equal the crate version, mirroring
      # publish-wasm.yml's check so a mismatched tag fails before publishing.
      - name: Verify tag matches crate version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="justerm-core") | .version')"
          echo "tag=$tag crate=$crate"
          test "$tag" = "$crate" || { echo "::error::tag v$tag != crate version $crate"; exit 1; }

      # -p justerm-core only; justerm-wasm-decode is publish = false (npm-only), so it is never sent to crates.io.
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p justerm-core --locked
