# Build / format / lint / test gate.
#
# The toolchain is taken from rust-toolchain.toml (pinned channel + clippy/rustfmt) — rustup
# honors that file automatically on the first cargo invocation, so there is no install step and a
# new Rust release cannot turn CI red on its own. Bumping the pin is a deliberate, reviewed change
# (that file says "keep in sync with ci.yml" — this is that ci).
name: test

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all --check
      # --workspace so the justerm-wasm-decode binding (the flatten core's host unit tests) is gated too.
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  # justerm-renderer is EXCLUDED from the root workspace (its web-sys/glow deps are wasm32-only), so
  # `cargo test --workspace` above never touches it — for slices #259..#340 nothing gated it at all
  # (#333). Its pure modules test on the host; its GL/wasm layer only compiles for wasm32.
  renderer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Format
        run: cargo fmt --manifest-path justerm-renderer/Cargo.toml --check
      - name: Test (host — pure modules)
        run: cargo test --manifest-path justerm-renderer/Cargo.toml
      - name: Clippy (wasm32 — the GL layer is 0-compile on host)
        run: cargo clippy --manifest-path justerm-renderer/Cargo.toml --target wasm32-unknown-unknown --all-targets -- -D warnings
      - name: Build (wasm32)
        run: cargo build --manifest-path justerm-renderer/Cargo.toml --target wasm32-unknown-unknown

  # The `demo/*.html` readPixels proofs (#328), swept across device pixel ratios (#331). Separate from
  # `renderer` on purpose: this job depends on a browser download, SwiftShader, and the runner's fonts,
  # so a flake here must not redden the deterministic cargo gate next to it — a gate people learn to
  # ignore is not a gate. Chromium only: xterm.js skips firefox/webkit on Linux because "webgl2 is
  # often not supported in headless firefox on Linux" (addon-webgl/test/WebglRenderer.test.ts).
  #
  # The emoji proofs need a colour-emoji font, and it is installed TWICE OVER: GitHub's ubuntu images
  # list `fonts-noto-color-emoji` in `toolsets/toolset-2404.json` apt.common_packages, and Playwright's
  # own `install --with-deps` unconditionally apt-installs its `tools` group — which contains
  # `fonts-noto-color-emoji`, `fonts-liberation` (box drawing) and `fonts-wqy-zenhei` (CJK) —
  # regardless of which browser is named (playwright-core registry/index.ts `targets.add('tools')`).
  # `demo/emoji*.html` still assert `colourEmojiFontPresent`, so a font-less runner fails by name
  # rather than through a baffling pixel assertion (#334).
  #
  # No WebGL flags are needed: Playwright injects `--enable-unsafe-swiftshader` into Chromium's default
  # args (chromium.ts), which is what lets headless fall back to SwiftShader for WebGL2.
  renderer-proofs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: justerm-renderer
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      # No new third-party action (same reasoning as wasm-pack / cargo-fuzz above): the runner image
      # already ships Node, and pnpm is one npm install away.
      #
      # The `@10` is load-bearing. pnpm 10 only WARNS about the dependency lifecycle scripts it skips
      # (`Ignored build scripts: esbuild, @swc/core`); pnpm 11 defaults `strictDepBuilds` to true and
      # turns that warning into `ERR_PNPM_IGNORED_BUILDS`, killing the install. Skipping them is
      # harmless — esbuild resolves `@esbuild/linux-x64` from optionalDependencies at runtime, not
      # from its postinstall — but `pnpm@latest` would not be.
      - name: Install pnpm
        run: npm install -g pnpm@10
        working-directory: .
      - name: Install deps
        run: pnpm install --frozen-lockfile
      # The pixel helpers all nine proofs read their evidence through. Fast, browserless.
      - name: Unit (demo/proof.js helpers)
        run: pnpm run test:unit
      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Proofs (dpr 1 / 1.1 / 1.5 / 2)
        run: pnpm run test:proofs

  # justerm-web is a pnpm/TypeScript package with no cargo gate to hide behind, and until #341 nothing
  # in CI ran its typecheck or its 387 vitest cases. `tsconfig.json` now also covers `demo/` and `e2e/`
  # — the code that PROVES the a11y contract was itself never type-checked.
  #
  # It consumes the PUBLISHED justerm-wasm-decode (not a workspace link), so this job needs no Rust.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: justerm-web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # No new third-party action, and the `@10` pin matters — see `renderer-proofs` above.
      - name: Install pnpm
        run: npm install -g pnpm@10
        working-directory: .
      - name: Install deps
        run: pnpm install --frozen-lockfile
      # Three tsconfig projects (#343): `src` is browser-only and refuses node's ambient globals,
      # `test`/`demo`/`e2e` get them, and the `*.config.ts` files get them without the DOM.
      - name: Typecheck (browser + test + node projects)
        run: pnpm run typecheck
      - name: Test (vitest)
        run: pnpm run test
      # What this step does NOT do: catch a type error the step above misses. Six probes were tried
      # (an emit-only TS4023, a `.d.ts` rollup of an `external` package's types, a bare type re-export,
      # an `export *` name collision, a missing entry) and `tsc --noEmit` reddened first in every case
      # that failed at all. It guards the artifact path itself — that `tsup` still resolves the entry,
      # bundles, and emits `dist/index.d.ts` — not a known gap. Kept because the package is meant to be
      # publishable and 2s is cheap; do not read a green here as "the public types are sound" (#344).
      - name: Build (tsup; artifact path only — see comment)
        run: pnpm run build

  # The a11y e2e (#160/#161): drives the real widget + real wasm decoder in headless Chromium and
  # asserts the aria-live announce + signal paths a screen reader would consume. Split from `web` for
  # the same reason `renderer-proofs` is split from `renderer`: a browser flake must not redden the
  # fast, deterministic gate beside it.
  web-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: justerm-web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The `@10` pin matters — see `renderer-proofs` above.
      - name: Install pnpm
        run: npm install -g pnpm@10
        working-directory: .
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium
      # `webServer` in playwright.config.ts starts `pnpm demo` (vite), so the real decoder runs.
      - name: E2E (a11y, input, wheel, fit)
        run: pnpm run test:e2e

  # The WASM decoder (#34, ADR-0008): build both wasm-pack targets and run the JS-boundary tests on
  # the wasm32 target. Separate from `test` because it needs the wasm32 target + wasm-pack, and the
  # tests/web.rs cases call js_sys (they self-exclude off-wasm via #![cfg(target_arch = "wasm32")]).
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown
      # Same install model as fuzz.yml's cargo-fuzz: compile from source, no new third-party action.
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Test (node)
        run: wasm-pack test --node justerm-wasm-decode
      # Build both published targets — bundler (Vite/webpack) and web (no-bundler ESM) — so a break
      # in either is caught at PR time (AC1). Publishing happens in publish-wasm.yml on a tag.
      - name: Build (bundler)
        run: |
          wasm-pack build --target bundler --out-dir pkg-bundler justerm-wasm-decode
          node justerm-wasm-decode/scripts/finish-pkg.mjs justerm-wasm-decode/pkg-bundler
      - name: Build (web)
        run: |
          wasm-pack build --target web --out-dir pkg-web justerm-wasm-decode
          node justerm-wasm-decode/scripts/finish-pkg.mjs justerm-wasm-decode/pkg-web
      # Smoke the assembled package as a consumer imports it — guards the
      # finish-pkg packaging glue that unit/boundary tests don't see (#37).
      - name: Smoke (assembled package)
        run: node justerm-wasm-decode/scripts/smoke.mjs justerm-wasm-decode/pkg-bundler
      # End-to-end: decode a golden frame (generated by native encode) through a
      # nodejs-target build and resolve a known cell's colour (#37 stretch).
      - name: Smoke (end-to-end decode)
        run: |
          wasm-pack build --target nodejs --out-dir pkg-node justerm-wasm-decode
          node justerm-wasm-decode/scripts/finish-pkg.mjs justerm-wasm-decode/pkg-node
          cargo run -q -p justerm-wasm-decode --example gen_smoke_frame -- justerm-wasm-decode/pkg-node/golden.jt
          node justerm-wasm-decode/scripts/smoke-decode.mjs justerm-wasm-decode/pkg-node justerm-wasm-decode/pkg-node/golden.jt
