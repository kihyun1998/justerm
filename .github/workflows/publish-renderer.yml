# Publish the justerm-renderer WebGL2 renderer to the public npm registry (#394, ADR-0018).
#
# Trigger: a `renderer-vX.Y.Z` tag. justerm-renderer is DELIBERATELY outside the workspace
# version-lockstep (root Cargo.toml) — it carries its own version track (0.1.0-series) because its
# web-sys/glow deps are wasm32-only and it ships on its own cadence. So it uses its own tag prefix,
# distinct from the workspace `v*` tags that publish justerm-core + justerm-wasm-decode. The verify
# step fails the publish if the tag and the built package version disagree, making the lockstep a hard
# gate rather than a convention (mirrors publish-wasm.yml).
#
# Setup required once by the maintainer: an `NPM_TOKEN` repository secret (npm automation token with
# publish rights for the `justerm-renderer` package). No new third-party action is introduced —
# wasm-pack is `cargo install`ed and npm auth is a one-line ~/.npmrc, matching the supply-chain posture
# (ADR-0006). The publish artifact is the `--target bundler` build (Vite/webpack consumes it); the
# renderer's GL proofs build `--target web` separately, so this job builds its own bundler output.
name: publish-renderer

on:
  push:
    tags:
      - "renderer-v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # No build cache here: publishing runs only on a `renderer-v*` tag (rare), so a cache buys
      # little, and just-shield R6 flags a third-party action sharing a job that holds the publish
      # token. Dropping rust-cache keeps `NPM_TOKEN` away from any third-party action (ADR-0006).

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      # Bundler target is the published artifact (justerm-web's Vite consumes it). Unlike
      # justerm-wasm-decode there is no finish-pkg step — the renderer ships pure wasm-bindgen output,
      # no hand-written JS helpers.
      - name: Build (bundler)
        run: wasm-pack build --target bundler --out-dir pkg justerm-renderer

      # Version-lockstep gate: the tag (minus the `renderer-v` prefix) must equal the package version
      # wasm-pack wrote from the crate version. A mismatch means an artifact would publish under a
      # version that is not the one tagged — fail instead.
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#renderer-v}"
          pkg="$(node -p "require('./justerm-renderer/pkg/package.json').version")"
          echo "tag=$tag package=$pkg"
          test "$tag" = "$pkg" || { echo "::error::tag renderer-v$tag != package version $pkg"; exit 1; }

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          # `./` prefix: without it npm parses `justerm-renderer/pkg` as a GitHub owner/repo shorthand,
          # not a local folder, and fails on git ls-remote.
          npm publish ./justerm-renderer/pkg --access public
