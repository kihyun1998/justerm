# Publish the justerm-renderer WebGL2 renderer to the public npm registry (#394, ADR-0018).
#
# Trigger: a `renderer-vX.Y.Z` tag. justerm-renderer is DELIBERATELY outside the workspace
# version-lockstep (root Cargo.toml) — it carries its own version track (0.1.0-series) because its
# web-sys/glow deps are wasm32-only and it ships on its own cadence. So it uses its own tag prefix,
# distinct from the workspace `v*` tags that publish justerm-core + justerm-wasm-decode. The verify
# step fails the publish if the tag and the built package version disagree, making the lockstep a hard
# gate rather than a convention (mirrors publish-wasm.yml).
#
# Setup required once by the maintainer: an `NPM_TOKEN` repository secret (npm automation token with
# publish rights for the `justerm-renderer` package). No new third-party action is introduced —
# wasm-pack is `cargo install`ed and npm auth is a one-line ~/.npmrc, matching the supply-chain posture
# (ADR-0006). The publish artifact is the `--target bundler` build (Vite/webpack consumes it); the
# renderer's GL proofs build `--target web` separately, so this job builds its own bundler output.
name: publish-renderer

on:
  push:
    tags:
      - "renderer-v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # No build cache here: publishing runs only on a `renderer-v*` tag (rare), so a cache buys
      # little, and just-shield R6 flags a third-party action sharing a job that holds the publish
      # token. Dropping rust-cache keeps `NPM_TOKEN` away from any third-party action (ADR-0006).

      # Reject a README claim that expires before the build spends any time — see publish-crate.yml
      # for why this runs at publish rather than on every PR. This crate is the reason the check
      # exists: its README announced "Under construction … the GPU pipeline lands in #260+" across
      # renderer-v0.1.0 … v0.6.1, so every consumer who found the package on npm read that it draws
      # nothing.
      - name: Verify the README makes no expiring claim
        run: node .github/scripts/check-published-readme.mjs justerm-renderer/README.md

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      # Bundler target is the published artifact (justerm-web's Vite consumes it). Unlike
      # justerm-wasm-decode there is no finish-pkg step — the renderer ships pure wasm-bindgen output,
      # no hand-written JS helpers.
      - name: Build (bundler)
        run: wasm-pack build --target bundler --out-dir pkg justerm-renderer

      # #472: the crate is dual-licensed and the texts must actually ship. `justerm-renderer/` carries
      # LICENSE-MIT + LICENSE-APACHE, which wasm-pack copies into `pkg/` — but copying is NOT enough:
      # `files` in the generated package.json is an **allowlist**, and npm's automatic inclusion covers
      # `LICENSE`/`LICENSE.md`, NOT the hyphenated `LICENSE-MIT` form. Without this step the tarball
      # ships a licence *declaration* with no licence *text* (which is what 0.5.0 and 0.6.0 did).
      # Same rule `justerm-wasm-decode/scripts/finish-pkg.mjs` applies; the renderer needs no other
      # post-processing, so it is inline rather than a script.
      - name: Add the licence texts to the package allowlist
        run: |
          node -e '
            const fs = require("fs");
            const p = "./justerm-renderer/pkg/package.json";
            const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
            for (const f of ["LICENSE-MIT", "LICENSE-APACHE"]) {
              if (!fs.existsSync("./justerm-renderer/pkg/" + f)) {
                console.error("::error::" + f + " missing from pkg/ — wasm-pack did not copy it");
                process.exit(1);
              }
              if (!pkg.files.includes(f)) pkg.files.push(f);
            }
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            console.log("files =", pkg.files.join(", "));
          '

      # Version-lockstep gate: the tag (minus the `renderer-v` prefix) must equal the package version
      # wasm-pack wrote from the crate version. A mismatch means an artifact would publish under a
      # version that is not the one tagged — fail instead.
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#renderer-v}"
          pkg="$(node -p "require('./justerm-renderer/pkg/package.json').version")"
          echo "tag=$tag package=$pkg"
          test "$tag" = "$pkg" || { echo "::error::tag renderer-v$tag != package version $pkg"; exit 1; }

      - name: Publish to npm (idempotent — skip if the version is already on the registry)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          pkg="$(node -p "require('./justerm-renderer/pkg/package.json').version")"
          # A version already on npm cannot be re-published (npm 403). Skip gracefully so a tag for a
          # version first published by hand (the initial renderer-v0.1.0, #394) is a GREEN no-op rather
          # than a red duplicate-publish — and re-tagging is always safe. `npm view pkg@ver version`
          # prints the version when it exists and empty when it does not (verified).
          if [ -n "$(npm view "justerm-renderer@$pkg" version 2>/dev/null || true)" ]; then
            echo "justerm-renderer@$pkg is already on npm — skipping publish."
          else
            # `./` prefix: without it npm parses `justerm-renderer/pkg` as a GitHub owner/repo shorthand.
            npm publish ./justerm-renderer/pkg --access public
          fi

  # #474: a GitHub Release for this track. Behaviour changes ship here (the renderer's semver basis is
  # the wasm class AND observable rendering, #465), and a registry publish carries no notes — so
  # without this a consumer bumping a caret has only the commit log.
  #
  # A SEPARATE job on purpose: it needs `contents: write`, which must not sit in the job holding
  # NPM_TOKEN (ADR-0006 — same reasoning that keeps third-party actions out of that job).
  #
  # Created at tag time, so `publishedAt` is correct by construction — that removes the objection
  # release.md raises against backfilling, for everything from here on.
  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # fetch-depth 0: the body is the tag's own annotation (what `git tag -a -m` wrote), which a
      # shallow clone does not carry.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # `%(contents)` is the ANNOTATION for an annotated tag (what `git tag -a -m` wrote, which is
          # what release.md's flow always creates). For a lightweight tag it falls through to the
          # tagged COMMIT's message instead of being empty — verified — so the `--generate-notes`
          # branch below is a true last resort (an empty commit message), not the lightweight-tag path.
          notes="$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")"
          # `--latest=false`: the Latest badge belongs to the `v*` engine track. Without it, whichever
          # track tagged most recently steals it, and `gh release create` does not warn.
          if [ -n "$notes" ]; then
            gh release create "$GITHUB_REF_NAME" --verify-tag --latest=false \
              --title "$GITHUB_REF_NAME" --notes "$notes"
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --latest=false \
              --title "$GITHUB_REF_NAME" --generate-notes
          fi
